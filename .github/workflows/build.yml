name: build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
  
    - name: install rust
      uses: dtolnay/rust-toolchain@stable
  
    - name: build
      run: cargo build --release
  
    - name: package
      run: |
        mkdir dist
        cp target/release/ascii-renderer dist/
        tar -czf ascii-renderer-linux-x86_64.tar.gz -C dist ascii-renderer
  
    - name: release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.tag || github.ref_name }}
        files: ascii-renderer-linux-x86_64.tar.gz
